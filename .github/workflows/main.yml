name: Compilar APK Python
on:
  push:
    branches: [ "main" ] # Asegúrate de que tu rama se llame "main" o "master"

jobs:
  build:
    runs-on: ubuntu-22.04 # Versión estable compatible con Buildozer
    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Compilar APK con Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1 # <- AQUÍ ESTÁ LA CORRECCIÓN
      with:
        workdir: .
        buildozer_version: stable

    - name: Subir APK generado
      uses: actions/upload-artifact@v4
      with:
        name: apk-python
        path: bin/*.apk
        
